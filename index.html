<!DOCTYPE html>
<html lang="de" translate="no">
    <head>
        <meta charset="utf-8" />
        <meta name="google" content="notranslate" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Ida &amp; Odo" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="manifest" href="site.webmanifest" />
        <title>Ida & Odo 1XL</title>
        <link rel="stylesheet" href="style.css" />
        <style>
          #gameFrame { background-color: #000; }
        </style>
    </head>
    <body>
        <div id="gameFrame">
            <div id="gameArea">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="controls">
                <button class="btn" id="leftBtn">←</button>
                <button class="btn" id="scoopBtn">🚀🧲</button>
                <button class="btn" id="rightBtn">→</button>
            </div>

            <button id="pauseBtn" class="pause-btn">⏸</button>
            <img id="startPoster" src="start_007.png" alt="">

            <!-- ── Pause-Overlay ─────────────────────────── -->
            <div id="pause-overlay" hidden>
                <div id="pause-box">
                    <div class="pause-title" data-i18n="pauseTitle">⏸</div>
                    <!-- AdSense-Banner für Web: ins div einfügen -->
                    <div id="pause-ad-banner" class="ad-banner-slot" hidden></div>
                    <button class="ad-free-btn" id="pause-noad-btn" data-i18n="adFreeBtn" hidden>✨</button>
                    <button class="restore-btn"  id="pause-restore-btn" data-i18n="adFreeRestore" hidden></button>
                    <button id="pause-continue-btn" class="pause-continue" data-i18n="pauseContinue">▶</button>
                </div>
            </div>

            <!-- ── Level-Transition — untere Banner-Leiste (ab Level 5) ── -->
            <div id="level-transition" hidden>
                <div id="lt-box">
                    <!-- Ad-Banner oben in der Leiste -->
                    <div id="lt-ad-banner" class="ad-banner-slot" hidden></div>
                    <!-- Infozeile: Level + Text | Countdown + Weiter -->
                    <div id="lt-row">
                        <div id="lt-left">
                            <div id="lt-level"></div>
                            <div id="lt-text"></div>
                        </div>
                        <div id="lt-right">
                            <div id="lt-countdown"></div>
                            <button id="lt-continue-btn" class="lt-continue-btn" data-i18n="ltContinue">▶</button>
                        </div>
                    </div>
                    <!-- "Werbung entfernen" als schmale Zeile ganz unten -->
                    <button class="ad-free-btn" id="lt-noad-btn" data-i18n="adFreeBtn" hidden>✨</button>
                </div>
            </div>

        </div>

        <div id="startOverlay" role="dialog" aria-modal="true">
            <div>
                <div style="margin-bottom:16px;font-size:20px;font-weight:bold;font-family:Arial" data-i18n="welcome"></div>
                <button id="startButton" data-i18n="startButton"></button>
                <p id="startHint"><span data-i18n="hint1"></span><br><span data-i18n="hint2"></span></p>
            </div>
        </div>

        <!-- Start-Banner: fixed am unteren Viewport-Rand, sofort sichtbar -->
        <div id="start-ad-banner" class="ad-banner-slot start-banner"></div>

        <!-- Landscape-Hinweis (CSS zeigt/versteckt via @media orientation) -->
        <div id="landscape-hint" aria-live="polite">
            <span style="font-size:48px">📱</span>
            <span data-i18n="rotateLandscape"></span>
        </div>
        
        <script src="locales/de.js"></script>
        <script src="locales/en.js"></script>
        <script src="locales/fr.js"></script>
        <script src="locales/it.js"></script>
        <script src="locales/zh.js"></script>
        <script src="locales/tr.js"></script>
        <script src="locales/es.js"></script>
        <script src="locales/pt.js"></script>
        <script src="locales/ru.js"></script>
        <script src="locales/pl.js"></script>
        <script src="locales/nl.js"></script>
        <script src="locales/ar.js"></script>
        <script src="locales/ja.js"></script>
        <script src="locales/th.js"></script>
        <script src="locales/ko.js"></script>
        <script src="locales/id.js"></script>
        <script src="locales/he.js"></script>
        <script src="locales/ae.js"></script>
        <script src="locales/hi.js"></script>
        <script src="locales/ur.js"></script>
        <script src="locales/bn.js"></script>
        <script src="locales/ro.js"></script>
        <script src="locales/vi.js"></script>
        <script src="locales/fa.js"></script>
        <script src="locales/sw.js"></script>
        <script src="locales/hr.js"></script>
        <script src="i18n.js"></script>
        <script src="start-screen.js"></script>
        <script src="game-state.js"></script>
        <script src="loader.js"></script>
        <script src="sound.js"></script>
        <script src="entity.js"></script>
        <script src="falling-entity.js"></script>
        <script src="overflow.js"></script>
        <script src="lump.js"></script>
        <script src="obstacle.js"></script>
        <script src="ida.js"></script>
        <script src="odo.js"></script>
        <script src="input-manager.js"></script>
        <script src="game-loop.js"></script>
        <script src="gdpr.js"></script>
        <script src="ad-manager.js"></script>
        <script src="highscore.js"></script>
        <script src="main.js"></script>
    </body>
</html>
